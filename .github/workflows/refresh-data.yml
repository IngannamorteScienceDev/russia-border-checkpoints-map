name: Refresh Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh checkpoint data
        run: python scripts/run_pipeline.py

      - name: Build data quality PR summary
        id: quality-summary
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("data/data_quality_report.json").read_text(encoding="utf-8"))
          summary = report.get("summary", {})
          warnings = report.get("warnings") or []
          lines = [
              f"- Checked records: {summary.get('checked', 0)}",
              f"- Blocking errors: {summary.get('errorCount', 0)}",
              f"- Warnings: {summary.get('warningCount', 0)}",
              f"- Dataset version: {report.get('datasetVersion', 'unknown')}",
          ]

          if warnings:
              lines.append("")
              lines.append("Top warnings:")
              lines.extend(f"- {warning}" for warning in warnings[:10])
          else:
              lines.append("- No data quality warnings.")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("body<<QUALITY_SUMMARY\n")
              output.write("\n".join(lines))
              output.write("\nQUALITY_SUMMARY\n")

      - name: Run Python validation tests
        run: python -m unittest discover -s tests -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Check frontend formatting
        run: npm run format:check

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Open data refresh pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh checkpoint data"
          title: "chore: refresh checkpoint data"
          body: |
            Automated data refresh from the scheduled pipeline.

            Data quality report:
            ${{ steps.quality-summary.outputs.body }}

            Checks run:
            - Python validation tests
            - Frontend lint
            - Frontend tests
          branch: data/refresh-checkpoints
          delete-branch: true
          labels: data
