name: Refresh Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh checkpoint data
        run: python scripts/run_pipeline.py

      - name: Run Python validation tests
        run: python -m unittest discover -s tests -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Check frontend formatting
        run: npm run format:check

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Open data refresh pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh checkpoint data"
          title: "chore: refresh checkpoint data"
          body: |
            Automated data refresh from the scheduled pipeline.

            Checks run:
            - Python validation tests
            - Frontend lint
            - Frontend tests
          branch: data/refresh-checkpoints
          delete-branch: true
          labels: data
