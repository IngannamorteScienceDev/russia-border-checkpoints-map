<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#071512" />
    <title>КПП РФ на глобусе</title>

    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./js/vendor/cesium/Widgets/widgets.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="loader" class="loader" role="status" aria-live="polite">
      <div class="loader__card">
        <div class="loader__title">КПП РФ</div>
        <div class="loader__bar"><div id="loaderProgress" class="loader__barFill"></div></div>
        <div id="loaderText" class="loader__text">Подготавливаем Cesium-глобус...</div>
      </div>
    </div>

    <main class="globe-shell">
      <div id="map" class="globe" aria-label="Глобус с пунктами пропуска РФ"></div>

      <header class="topbar">
        <div class="topbar__title">
          <span>CesiumJS Globe</span>
          <h1>Пункты пропуска РФ</h1>
        </div>
        <div id="stats" class="stats" aria-label="Сводка по КПП"></div>
      </header>

      <section id="controlPanel" class="control-panel" aria-label="Инструменты КПП">
        <label class="field field--search">
          <span>Поиск КПП</span>
          <input
            id="checkpointSearch"
            type="search"
            autocomplete="off"
            placeholder="Название, страна, регион или ID"
          />
        </label>

        <div class="control-panel__grid">
          <label class="field">
            <span>Тип</span>
            <select id="typeFilter"></select>
          </label>
          <label class="field">
            <span>Статус</span>
            <select id="statusFilter"></select>
          </label>
        </div>

        <div class="control-panel__actions">
          <label class="toggle">
            <input id="clusterToggle" type="checkbox" checked />
            <span>Кластеры</span>
          </label>
          <button id="fitFiltered" class="tool-button" type="button">Показать выборку</button>
          <button id="resetFilters" class="tool-button tool-button--muted" type="button">
            Сброс
          </button>
        </div>

        <div id="searchResults" class="search-results" hidden></div>
      </section>

      <nav id="cameraDock" class="camera-dock" aria-label="Пресеты камеры"></nav>

      <aside id="checkpointInspector" class="inspector" aria-live="polite" hidden></aside>
      <aside id="legend" class="legend" aria-label="Легенда типов КПП"></aside>

      <div id="mapFallback" class="map-fallback" role="alert" hidden>
        <b>Глобус временно недоступен</b>
        <span>CesiumJS runtime не загрузился.</span>
      </div>
    </main>

    <script>
      window.CESIUM_BASE_URL = "./js/vendor/cesium/";
    </script>
    <script src="./js/vendor/cesium/Cesium.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
